<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Teacher Dashboard – Makerverse</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="dashboard">
    <header class="dash-header">
      <h1>🎮 iRISE</h1>
      <span>👩‍🏫 Teacher Panel</span>
      <a href="index.html" class="btn-logout">Logout</a>
    </header>

    <div class="stats-row">
      <div class="stat-card">
        <h3>👨‍🎓 Students</h3>
        <p id="student-count">0</p>
      </div>
      <div class="stat-card">
        <h3>📚 Quests</h3>
        <p id="quest-count">3</p>
      </div>
      <div class="stat-card">
        <h3>🏆 Top points</h3>
        <p id="top-points">0 points</p>
      </div>
    </div>

    <div class="section">
      <h2>➕ Add New Quest</h2>
      <div class="add-quest-form">
        <input type="text" id="quest-name" placeholder="Quest name..." />
        <input type="number" id="quest-points" placeholder="points reward..." />
        <button onclick="addQuest()">Add Quest</button>
      </div>
    </div>

    <div class="section">
      <h2>📋 Student List</h2>
      <div class="student-list" id="student-list"></div>
    </div>

    <div class="section">
      <h2>📚 Quest List</h2>
      <div id="quest-list">
        <div class="quest-card">
          <span>📖 Read Chapter 1</span>
          <span class="points-badge">50 points</span>
        </div>
        <div class="quest-card">
          <span>✏️ Answer Quiz 1</span>
          <span class="points-badge">100 points</span>
        </div>
        <div class="quest-card">
          <span>🔬 Submit Lab Report</span>
          <span class="points-badge">150 points</span>
        </div>
      </div>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
