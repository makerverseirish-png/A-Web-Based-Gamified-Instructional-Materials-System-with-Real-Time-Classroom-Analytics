<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Student Dashboard – Makerverse</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="dashboard">
    <header class="dash-header">
      <h1>🎮 iRISE</h1>
      <span id="welcome-msg">Welcome, Student!</span>
      <a href="index.html" onclick="logout()" class="btn-logout">Logout</a>
    </header>
    
    <div class="stats-row">
      <div class="stat-card">
        <h3>⭐ Score</h3>
        <p id="total-points">0 Score</p>
      </div>
      <div class="stat-card">
        <h3>🎯 Level</h3>
        <p id="level">Level 1</p>
      </div>
      <div class="stat-card">
        <h3>🔥 Streak</h3>
        <p id="streak">0 Days</p>
      </div>
    </div>
    
    <div class="section">
      <h2>📚 Active Quests</h2>
      <div class="quest-list">
        <div class="quest-card">
          <span>📖 Read Chapter 1</span>
          <button onclick="completeQuest(this, 'quest1', 50)">Complete +50 Score</button>
        </div>
        <div class="quest-card">
          <span>✏️ Answer Quiz 1</span>
          <button onclick="completeQuest(this, 'quest2', 100)">Complete +100 Score</button>
        </div>
        <div class="quest-card">
          <span>🔬 Submit Lab Report</span>
          <button onclick="completeQuest(this, 'quest3', 150)">Complete +150 Score</button>
        </div>
      </div>
    </div>
    
    <div class="section">
      <h2>🎖️ Badges</h2>
      <div class="badges-row" id="badges">
        <span class="badge locked">🔒 First Quest</span>
        <span class="badge locked">🔒 Quiz Master</span>
        <span class="badge locked">🔒 Streak 7 Days</span>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
